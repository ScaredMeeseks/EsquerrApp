name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install npm dependencies
        run: npm install

      - name: Copy web assets to www/
        run: |
          mkdir -p www
          rsync -av --exclude='android' --exclude='node_modules' --exclude='www' \
            --exclude='.git' --exclude='package.json' --exclude='package-lock.json' \
            --exclude='capacitor.config.json' --exclude='.github' --exclude='functions' \
            ./ www/

      - name: Sync Capacitor (copy assets + install native plugins)
        run: npx cap sync android

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > android/app/google-services.json

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Accept Android SDK licenses & install SDK 36
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses && $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Build debug APK
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug --stacktrace --info

      - name: Upload APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: EsquerrApp-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
