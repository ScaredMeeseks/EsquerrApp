<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Body Map — Polygon Tracer</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#1a1a2e; display:flex; font-family:sans-serif; color:#fff; height:100vh; overflow:hidden; }
.left { flex:1; display:flex; align-items:center; justify-content:center; padding:10px; position:relative; overflow:hidden; }
.right { width:340px; display:flex; flex-direction:column; border-left:1px solid #444; background:#111; }
.wrap { position:relative; display:inline-block; line-height:0; transform-origin:0 0; }
.wrap img { display:block; height:92vh; user-select:none; pointer-events:none; }
.wrap svg { position:absolute; top:0; left:0; width:100%; height:100%; cursor:crosshair; }
.grid-line { stroke:rgba(255,255,0,.15); stroke-width:.1; }
.grid-line-major { stroke:rgba(255,255,0,.35); stroke-width:.15; }
.grid-label { fill:rgba(255,255,0,.5); font-size:1.6px; font-family:monospace; }
#coords { position:absolute; top:8px; left:8px; background:rgba(0,0,0,.7); color:#0f0; padding:6px 12px; border-radius:4px; font:bold 14px monospace; z-index:10; pointer-events:none; }
#zoomLevel { position:absolute; top:8px; left:180px; background:rgba(0,0,0,.7); color:#ff0; padding:6px 10px; border-radius:4px; font:bold 12px monospace; z-index:10; pointer-events:none; }

/* Drawing state */
.active-poly { fill:rgba(239,83,80,.2); stroke:#ef5350; stroke-width:.3; }
.done-poly { fill:rgba(100,200,100,.12); stroke:rgba(100,200,100,.6); stroke-width:.2; cursor:pointer; }
.done-poly:hover { fill:rgba(100,200,100,.3); }
.vert-dot { fill:#ff0; stroke:#000; stroke-width:.15; cursor:pointer; }
.vert-dot:hover { fill:#f00; r:1; }

/* Right panel */
.panel-header { padding:10px; background:#1a1a2e; border-bottom:1px solid #333; font-weight:bold; font-size:14px; }
.todo-list { flex:1; overflow-y:auto; padding:8px; }
.todo-item { padding:6px 8px; margin:2px 0; border-radius:4px; font-size:12px; cursor:pointer; display:flex; align-items:center; gap:6px; }
.todo-item.pending { background:#222; color:#aaa; }
.todo-item.active { background:#ef5350; color:#fff; font-weight:bold; }
.todo-item.done { background:#1b5e20; color:#81c784; text-decoration:line-through; }
.todo-item .num { min-width:18px; text-align:right; opacity:.6; }
.controls { padding:10px; border-top:1px solid #333; display:flex; flex-direction:column; gap:6px; }
.controls button { padding:8px; font-size:12px; font-weight:600; border:none; border-radius:4px; cursor:pointer; }
.btn-finish { background:#4caf50; color:#fff; }
.btn-finish:hover { background:#388e3c; }
.btn-undo { background:#ff9800; color:#fff; }
.btn-undo:hover { background:#e65100; }
.btn-skip { background:#607d8b; color:#fff; }
.btn-skip:hover { background:#37474f; }
.btn-export { background:#2196f3; color:#fff; }
.btn-export:hover { background:#1565c0; }
.btn-delete { background:#f44336; color:#fff; }
.btn-delete:hover { background:#b71c1c; }
#output { padding:10px; border-top:1px solid #333; max-height:200px; overflow-y:auto; }
#output textarea { width:100%; height:140px; background:#0a0a0a; color:#0f0; border:1px solid #333; border-radius:4px; font:11px monospace; padding:6px; resize:none; }
.hint { font-size:11px; color:#888; padding:4px 10px; }
</style>
</head>
<body>
<div class="left" id="viewport">
  <div id="coords">x: — y: —</div>
  <div id="zoomLevel">1.0×</div>
  <div class="wrap" id="wrap">
    <img src="img/cuerpos.png" id="img">
    <svg viewBox="0 0 100 100" preserveAspectRatio="none" id="svg"></svg>
  </div>
</div>
<div class="right">
  <div class="panel-header">🏥 Polygon Tracer</div>
  <div class="hint">Click to add vertices. Scroll to zoom. Middle-click drag to pan. Enter=finish, Z=undo, Esc=cancel.</div>
  <div class="todo-list" id="todoList"></div>
  <div class="controls">
    <button class="btn-finish" id="btnFinish" disabled>✓ Finish polygon (or press Enter)</button>
    <button class="btn-undo" id="btnUndo" disabled>↩ Undo last vertex (or press Z)</button>
    <button class="btn-delete" id="btnDelete" disabled>✕ Delete selected polygon</button>
    <button class="btn-skip" id="btnSkip">⏭ Skip this muscle</button>
    <button class="btn-export" id="btnExport">📋 Export all to clipboard</button>
  </div>
  <div id="output"><textarea id="exportArea" readonly placeholder="Exported coordinates will appear here..."></textarea></div>
</div>

<script>
var MUSCLES = [
  // FRONT VIEW
  {id:'f_shoulder_l', label:'Front — Left Shoulder', groups:"['Shoulders']"},
  {id:'f_shoulder_r', label:'Front — Right Shoulder', groups:"['Shoulders']"},
  {id:'f_chest_l', label:'Front — Left Chest', groups:"['Chest']"},
  {id:'f_chest_r', label:'Front — Right Chest', groups:"['Chest']"},
  {id:'f_abs', label:'Front — Abs', groups:"['Abdominals']"},
  {id:'f_oblique_l', label:'Front — Left Oblique', groups:"['Abdominals']"},
  {id:'f_oblique_r', label:'Front — Right Oblique', groups:"['Abdominals']"},
  {id:'f_bicep_l', label:'Front — Left Bicep', groups:"['Biceps']"},
  {id:'f_bicep_r', label:'Front — Right Bicep', groups:"['Biceps']"},
  {id:'f_forearm_l', label:'Front — Left Forearm', groups:"['Forearm']"},
  {id:'f_forearm_r', label:'Front — Right Forearm', groups:"['Forearm']"},
  {id:'f_hip_groin', label:'Front — Hip / Groin', groups:"['Hip Flexors','Groin','Adductors']"},
  {id:'f_quad_l', label:'Front — Left Quad', groups:"['Quadriceps']"},
  {id:'f_quad_r', label:'Front — Right Quad', groups:"['Quadriceps']"},
  {id:'f_knee_l', label:'Front — Left Knee', groups:"['Knee']"},
  {id:'f_knee_r', label:'Front — Right Knee', groups:"['Knee']"},
  {id:'f_shin_l', label:'Front — Left Shin / Calf', groups:"['Calves']"},
  {id:'f_shin_r', label:'Front — Right Shin / Calf', groups:"['Calves']"},
  {id:'f_ankle_l', label:'Front — Left Ankle', groups:"['Ankle']"},
  {id:'f_ankle_r', label:'Front — Right Ankle', groups:"['Ankle']"},
  // BACK VIEW
  {id:'b_shoulder_l', label:'Back — Left Shoulder', groups:"['Shoulders']"},
  {id:'b_shoulder_r', label:'Back — Right Shoulder', groups:"['Shoulders']"},
  {id:'b_upper_back', label:'Back — Upper Back / Traps', groups:"['Back','Shoulders']"},
  {id:'b_lat_l', label:'Back — Left Lat', groups:"['Back']"},
  {id:'b_lat_r', label:'Back — Right Lat', groups:"['Back']"},
  {id:'b_lower_back', label:'Back — Lower Back', groups:"['Back']"},
  {id:'b_tricep_l', label:'Back — Left Tricep', groups:"['Triceps']"},
  {id:'b_tricep_r', label:'Back — Right Tricep', groups:"['Triceps']"},
  {id:'b_forearm_l', label:'Back — Left Forearm', groups:"['Forearm']"},
  {id:'b_forearm_r', label:'Back — Right Forearm', groups:"['Forearm']"},
  {id:'b_glute_l', label:'Back — Left Glute', groups:"['Glutes']"},
  {id:'b_glute_r', label:'Back — Right Glute', groups:"['Glutes']"},
  {id:'b_hamstring_l', label:'Back — Left Hamstring', groups:"['Hamstrings']"},
  {id:'b_hamstring_r', label:'Back — Right Hamstring', groups:"['Hamstrings']"},
  {id:'b_calf_l', label:'Back — Left Calf', groups:"['Calves']"},
  {id:'b_calf_r', label:'Back — Right Calf', groups:"['Calves']"},
  {id:'b_ankle_l', label:'Back — Left Ankle', groups:"['Ankle']"},
  {id:'b_ankle_r', label:'Back — Right Ankle', groups:"['Ankle']"}
];

// Display names for export
var LABEL_MAP = {
  f_shoulder_l:'Shoulder', f_shoulder_r:'Shoulder',
  f_chest_l:'Chest', f_chest_r:'Chest',
  f_abs:'Abs', f_oblique_l:'Oblique', f_oblique_r:'Oblique',
  f_bicep_l:'Bicep', f_bicep_r:'Bicep',
  f_forearm_l:'Forearm', f_forearm_r:'Forearm',
  f_hip_groin:'Hip / Groin',
  f_quad_l:'Quad', f_quad_r:'Quad',
  f_knee_l:'Knee', f_knee_r:'Knee',
  f_shin_l:'Shin / Calf', f_shin_r:'Shin / Calf',
  f_ankle_l:'Ankle', f_ankle_r:'Ankle',
  b_shoulder_l:'Shoulder', b_shoulder_r:'Shoulder',
  b_upper_back:'Upper Back', b_lat_l:'Lat', b_lat_r:'Lat',
  b_lower_back:'Lower Back',
  b_tricep_l:'Tricep', b_tricep_r:'Tricep',
  b_forearm_l:'Forearm', b_forearm_r:'Forearm',
  b_glute_l:'Glute', b_glute_r:'Glute',
  b_hamstring_l:'Hamstring', b_hamstring_r:'Hamstring',
  b_calf_l:'Calf', b_calf_r:'Calf',
  b_ankle_l:'Ankle', b_ankle_r:'Ankle'
};

var svgNS = 'http://www.w3.org/2000/svg';
var svg = document.getElementById('svg');
var wrap = document.getElementById('wrap');
var coordsEl = document.getElementById('coords');
var todoEl = document.getElementById('todoList');
var exportArea = document.getElementById('exportArea');

// State
var results = {}; // id → pts string
var currentIdx = -1;
var currentPts = [];
var currentPoly = null;
var currentDots = [];

// Draw grid
for (var i = 0; i <= 100; i += 5) {
  var cls = (i % 10 === 0) ? 'grid-line-major' : 'grid-line';
  var h = document.createElementNS(svgNS,'line');
  h.setAttribute('x1','0'); h.setAttribute('x2','100');
  h.setAttribute('y1',i); h.setAttribute('y2',i);
  h.setAttribute('class',cls); svg.appendChild(h);
  var v = document.createElementNS(svgNS,'line');
  v.setAttribute('x1',i); v.setAttribute('x2',i);
  v.setAttribute('y1','0'); v.setAttribute('y2','100');
  v.setAttribute('class',cls); svg.appendChild(v);
  if (i % 10 === 0 && i > 0 && i < 100) {
    var lbl = document.createElementNS(svgNS,'text');
    lbl.setAttribute('x', i + 0.3); lbl.setAttribute('y', '2');
    lbl.setAttribute('class','grid-label'); lbl.textContent = i;
    svg.appendChild(lbl);
    var lbl2 = document.createElementNS(svgNS,'text');
    lbl2.setAttribute('x', '0.3'); lbl2.setAttribute('y', i + 0.3);
    lbl2.setAttribute('class','grid-label'); lbl2.textContent = i;
    svg.appendChild(lbl2);
  }
}

// Build todo list
function renderTodo() {
  todoEl.innerHTML = '';
  MUSCLES.forEach(function(m, i) {
    var div = document.createElement('div');
    div.className = 'todo-item ' + (results[m.id] ? 'done' : (i === currentIdx ? 'active' : 'pending'));
    div.innerHTML = '<span class="num">' + (i+1) + '.</span> ' + m.label;
    div.addEventListener('click', function() { startMuscle(i); });
    todoEl.appendChild(div);
  });
}

function startMuscle(idx) {
  if (currentIdx >= 0 && currentPts.length >= 3) finishCurrent();
  else clearCurrent();
  currentIdx = idx;
  currentPts = [];
  // If already traced, load its points for editing
  if (results[MUSCLES[idx].id]) {
    var pts = results[MUSCLES[idx].id].split(' ');
    pts.forEach(function(p) { var xy = p.split(','); currentPts.push([parseFloat(xy[0]), parseFloat(xy[1])]); });
    // Remove old done poly
    var old = svg.querySelector('[data-id="' + MUSCLES[idx].id + '"]');
    if (old) old.remove();
    delete results[MUSCLES[idx].id];
  }
  renderDrawing();
  renderTodo();
  document.getElementById('btnFinish').disabled = false;
  document.getElementById('btnUndo').disabled = false;
  document.getElementById('btnDelete').disabled = false;
  // Scroll active into view
  var activeEl = todoEl.querySelector('.active');
  if (activeEl) activeEl.scrollIntoView({block:'nearest'});
}

function getCoord(e) {
  var r = wrap.getBoundingClientRect();
  return [
    Math.round(((e.clientX - r.left) / r.width * 100) * 10) / 10,
    Math.round(((e.clientY - r.top) / r.height * 100) * 10) / 10
  ];
}

// Mouse tracking
wrap.addEventListener('mousemove', function(e) {
  var c = getCoord(e);
  coordsEl.textContent = 'x: ' + c[0].toFixed(1) + '  y: ' + c[1].toFixed(1);
});

// Click to add vertex
svg.addEventListener('click', function(e) {
  if (currentIdx < 0) return;
  var c = getCoord(e);
  currentPts.push(c);
  renderDrawing();
});

function renderDrawing() {
  // Remove old drawing elements
  if (currentPoly) currentPoly.remove();
  currentDots.forEach(function(d) { d.remove(); });
  currentDots = [];
  if (currentPts.length === 0) return;
  // Draw polygon
  var pts = currentPts.map(function(p) { return p[0] + ',' + p[1]; }).join(' ');
  currentPoly = document.createElementNS(svgNS, 'polygon');
  currentPoly.setAttribute('points', pts);
  currentPoly.setAttribute('class', 'active-poly');
  svg.appendChild(currentPoly);
  // Draw vertex dots
  currentPts.forEach(function(p, i) {
    var c = document.createElementNS(svgNS, 'circle');
    c.setAttribute('cx', p[0]); c.setAttribute('cy', p[1]);
    c.setAttribute('r', '.6'); c.setAttribute('class', 'vert-dot');
    c.addEventListener('click', function(ev) {
      ev.stopPropagation();
      currentPts.splice(i, 1);
      renderDrawing();
    });
    svg.appendChild(c);
    currentDots.push(c);
  });
}

function clearCurrent() {
  if (currentPoly) { currentPoly.remove(); currentPoly = null; }
  currentDots.forEach(function(d) { d.remove(); });
  currentDots = [];
  currentPts = [];
  currentIdx = -1;
}

function finishCurrent() {
  if (currentIdx < 0 || currentPts.length < 3) return;
  var m = MUSCLES[currentIdx];
  var pts = currentPts.map(function(p) { return p[0] + ',' + p[1]; }).join(' ');
  results[m.id] = pts;
  // Create done polygon
  var poly = document.createElementNS(svgNS, 'polygon');
  poly.setAttribute('points', pts);
  poly.setAttribute('class', 'done-poly');
  poly.dataset.id = m.id;
  // Insert before grid labels (at start)
  svg.insertBefore(poly, svg.firstChild);
  // Clean up
  if (currentPoly) { currentPoly.remove(); currentPoly = null; }
  currentDots.forEach(function(d) { d.remove(); });
  currentDots = [];
  currentPts = [];
  // Auto-advance to next undone
  var next = -1;
  for (var i = currentIdx + 1; i < MUSCLES.length; i++) {
    if (!results[MUSCLES[i].id]) { next = i; break; }
  }
  currentIdx = next;
  renderTodo();
  document.getElementById('btnFinish').disabled = (next < 0);
  document.getElementById('btnUndo').disabled = (next < 0);
  if (next >= 0) {
    var activeEl = todoEl.querySelector('.active');
    if (activeEl) activeEl.scrollIntoView({block:'nearest'});
  }
}

// Buttons
document.getElementById('btnFinish').addEventListener('click', function() { finishCurrent(); });
document.getElementById('btnUndo').addEventListener('click', function() {
  if (currentPts.length > 0) { currentPts.pop(); renderDrawing(); }
});
document.getElementById('btnSkip').addEventListener('click', function() {
  clearCurrent();
  // Advance to next
  for (var i = 0; i < MUSCLES.length; i++) {
    if (!results[MUSCLES[i].id] && i !== currentIdx) { startMuscle(i); return; }
  }
  currentIdx = -1; renderTodo();
});
document.getElementById('btnDelete').addEventListener('click', function() {
  if (currentIdx >= 0) {
    var m = MUSCLES[currentIdx];
    var old = svg.querySelector('[data-id="' + m.id + '"]');
    if (old) old.remove();
    delete results[m.id];
    clearCurrent();
    renderTodo();
  }
});
document.getElementById('btnExport').addEventListener('click', function() {
  var lines = [];
  MUSCLES.forEach(function(m) {
    if (!results[m.id]) return;
    var displayLabel = LABEL_MAP[m.id] || m.label;
    lines.push("      {pts:'" + results[m.id] + "', label:'" + displayLabel + "', groups:" + m.groups + "}");
  });
  var out = lines.join(',\n');
  exportArea.value = out;
  exportArea.select();
  navigator.clipboard.writeText(out).then(function() {
    document.getElementById('btnExport').textContent = '✅ Copied!';
    setTimeout(function() { document.getElementById('btnExport').textContent = '📋 Export all to clipboard'; }, 2000);
  });
});

// Keyboard shortcuts
document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'Enter') { e.preventDefault(); finishCurrent(); }
  if (e.key === 'z' || e.key === 'Z') { if (currentPts.length > 0) { currentPts.pop(); renderDrawing(); } }
  if (e.key === 'Escape') { clearCurrent(); renderTodo(); }
});

// Init
renderTodo();
startMuscle(0);

// Zoom & pan
var scale = 1, panX = 0, panY = 0, isPanning = false, panStartX = 0, panStartY = 0;
var viewport = document.getElementById('viewport');
var zoomEl = document.getElementById('zoomLevel');

function applyTransform() {
  wrap.style.transform = 'translate(' + panX + 'px,' + panY + 'px) scale(' + scale + ')';
  zoomEl.textContent = scale.toFixed(1) + '×';
}

viewport.addEventListener('wheel', function(e) {
  e.preventDefault();
  var rect = wrap.getBoundingClientRect();
  var mx = e.clientX - rect.left;
  var my = e.clientY - rect.top;
  var oldScale = scale;
  if (e.deltaY < 0) scale = Math.min(scale * 1.15, 8);
  else scale = Math.max(scale / 1.15, 0.5);
  // Zoom toward mouse position
  panX += mx * (1 - scale / oldScale);
  panY += my * (1 - scale / oldScale);
  applyTransform();
}, {passive: false});

viewport.addEventListener('mousedown', function(e) {
  if (e.button === 1 || e.button === 2) { // Middle or right click
    e.preventDefault();
    isPanning = true;
    panStartX = e.clientX - panX;
    panStartY = e.clientY - panY;
    viewport.style.cursor = 'grabbing';
  }
});
viewport.addEventListener('contextmenu', function(e) { e.preventDefault(); });
window.addEventListener('mousemove', function(e) {
  if (isPanning) {
    panX = e.clientX - panStartX;
    panY = e.clientY - panStartY;
    applyTransform();
  }
});
window.addEventListener('mouseup', function(e) {
  if ((e.button === 1 || e.button === 2) && isPanning) {
    isPanning = false;
    viewport.style.cursor = '';
  }
});

// Double-click to reset zoom
viewport.addEventListener('dblclick', function(e) {
  if (e.target === viewport) {
    scale = 1; panX = 0; panY = 0;
    applyTransform();
  }
});
</script>
</body>
</html>
